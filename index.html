<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MediTech OS</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon2.png">

    <style>
        /* Base Reset */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        /* The App Iframe - Starts completely transparent (invisible) */
        iframe { width: 100vw; height: 100vh; border: none; opacity: 0; transition: opacity 0.4s ease-in; }
        
        /* ------------------------------------------- */
        /* PROFESSIONAL SPLASH SCREEN ANIMATION        */
        /* ------------------------------------------- */
        #splash-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: #ffffff; z-index: 9999; transition: opacity 0.4s ease-out;
        }
        
        /* The Blue Spinning Ring */
        .spinner {
            width: 48px; height: 48px; border: 4px solid #e9ecef;
            border-top: 4px solid #0d6efd; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 24px;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Branding Text */
        .brand-text { font-size: 24px; font-weight: bold; color: #212529; margin: 0; letter-spacing: 0.5px;}
        .sub-text { font-size: 13px; color: #6c757d; margin-top: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px;}
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="spinner"></div>
        <h1 class="brand-text">MediTech OS</h1>
        <p class="sub-text">Establishing Secure Connection</p>
    </div>

    <iframe id="app-frame" src="YOUR_LIVE_APPS_SCRIPT_EXEC_URL_HERE" allow="camera; microphone; fullscreen"></iframe>

    <script>
        // 3. The Logic: Wait for Google to finish, then swap the screens!
        document.getElementById('app-frame').onload = function() {
            // Fade out the splash screen
            document.getElementById('splash-screen').style.opacity = '0';
            
            // Fade in the actual application
            document.getElementById('app-frame').style.opacity = '1';
            
            // Remove the splash screen from memory after the fade animation finishes
            setTimeout(() => { 
                document.getElementById('splash-screen').style.display = 'none'; 
            }, 400);
        };
    </script>
</body>
</html>
