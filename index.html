<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MediTech OS</title>
    
    <link rel="manifest" href="/meditech-app/manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon2.png">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #ffffff; font-family: sans-serif; }
        iframe { width: 100vw; height: 100vh; border: none; opacity: 0; transition: opacity 0.4s; }
        #splash { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: white; z-index: 9; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #0d6efd; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="splash"><div class="spinner"></div><p>MediTech OS</p></div>
    <iframe id="f" src="https://script.google.com/macros/s/AKfycbzEtGfBvXQhaXLGMi1U7NcRMAV9rh233GF6S80ZPAq6whGit1X8OQcyG_IQXZRmpFDRFw/exec"></iframe>

    <script>
        document.getElementById('f').onload = () => {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('f').style.opacity = '1';
        };

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/meditech-app/sw.js', {scope: '/meditech-app/'});
        }
    </script>
</body>
</html>
